services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder # Just use the builder stage to have dev dependencies available
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules # Prevent host node_modules from overwriting container node_modules
    command: npm run dev
